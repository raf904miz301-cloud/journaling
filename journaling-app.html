<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>私を好きになるジャーナリング</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Zen+Maru+Gothic:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdf8f3;
    --surface: #fffcf8;
    --accent1: #c8a882;
    --accent2: #e8c4a0;
    --accent3: #f5e6d3;
    --text: #3d2e22;
    --text-light: #8a7060;
    --ai-bg: #f7f0e8;
    --user-bg: #fff9f4;
    --border: #e8d8c8;
    --gold: #b8914a;
    --shadow: rgba(180,140,100,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Serif JP', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(200,168,130,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(232,196,160,0.08) 0%, transparent 60%);
    pointer-events: none;
  }

  .header {
    text-align: center;
    margin-bottom: 36px;
    animation: fadeIn 1s ease;
  }

  .header .symbol {
    font-size: 36px;
    margin-bottom: 8px;
    opacity: 0.7;
  }

  .header h1 {
    font-size: clamp(20px, 5vw, 28px);
    font-weight: 300;
    letter-spacing: 0.1em;
    color: var(--gold);
  }

  .header p {
    font-size: 13px;
    color: var(--text-light);
    margin-top: 6px;
    font-family: 'Zen Maru Gothic', sans-serif;
    letter-spacing: 0.05em;
  }

  .stage-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 32px;
    animation: fadeIn 1s ease 0.2s both;
  }

  .stage-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--border);
    transition: all 0.4s ease;
  }

  .stage-dot.active {
    background: var(--gold);
    box-shadow: 0 0 8px rgba(184,145,74,0.4);
  }

  .stage-dot.done {
    background: var(--accent1);
  }

  .chat-area {
    width: 100%;
    max-width: 680px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .bubble {
    display: flex;
    gap: 12px;
    animation: slideUp 0.5s ease;
  }

  .bubble.ai { flex-direction: row; }
  .bubble.user { flex-direction: row-reverse; }

  .avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    align-self: flex-start;
    margin-top: 4px;
  }

  .avatar.ai-avatar {
    background: linear-gradient(135deg, var(--accent1), var(--accent2));
    box-shadow: 0 2px 8px var(--shadow);
  }

  .avatar.user-avatar {
    background: linear-gradient(135deg, #d4b896, #c8a882);
    box-shadow: 0 2px 8px var(--shadow);
  }

  .msg {
    max-width: calc(100% - 56px);
    padding: 16px 20px;
    border-radius: 20px;
    font-size: 15px;
    line-height: 1.8;
    font-weight: 300;
    white-space: pre-wrap;
  }

  .bubble.ai .msg {
    background: var(--ai-bg);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }

  .bubble.user .msg {
    background: linear-gradient(135deg, #efe5d8, #e8d8c8);
    border-top-right-radius: 4px;
    color: var(--text);
  }

  .msg .label {
    font-size: 11px;
    color: var(--text-light);
    letter-spacing: 0.08em;
    margin-bottom: 8px;
    font-family: 'Zen Maru Gothic', sans-serif;
    display: block;
  }

  .input-section {
    width: 100%;
    max-width: 680px;
    margin-top: 8px;
    animation: fadeIn 0.5s ease;
  }

  .input-hint {
    font-size: 13px;
    color: var(--text-light);
    font-family: 'Zen Maru Gothic', sans-serif;
    margin-bottom: 10px;
    letter-spacing: 0.05em;
    text-align: center;
  }

  .entries-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 16px;
  }

  .entry-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .entry-num {
    font-size: 13px;
    color: var(--gold);
    font-weight: 500;
    min-width: 24px;
    text-align: right;
    font-family: 'Zen Maru Gothic', sans-serif;
  }

  .entry-input {
    flex: 1;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 14px;
    font-family: 'Noto Serif JP', serif;
    color: var(--text);
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
    resize: none;
    min-height: 44px;
    line-height: 1.6;
  }

  .entry-input:focus {
    border-color: var(--accent1);
    box-shadow: 0 0 0 3px rgba(200,168,130,0.15);
  }

  .entry-input::placeholder { color: var(--text-light); opacity: 0.6; }

  .main-textarea {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 16px 20px;
    font-size: 15px;
    font-family: 'Noto Serif JP', serif;
    color: var(--text);
    outline: none;
    resize: none;
    min-height: 100px;
    line-height: 1.8;
    transition: border-color 0.3s, box-shadow 0.3s;
    margin-bottom: 14px;
  }

  .main-textarea:focus {
    border-color: var(--accent1);
    box-shadow: 0 0 0 3px rgba(200,168,130,0.15);
  }

  .main-textarea::placeholder { color: var(--text-light); opacity: 0.6; }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 14px;
  }

  .choice-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 14px 20px;
    font-size: 14px;
    font-family: 'Noto Serif JP', serif;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    transition: all 0.25s ease;
    line-height: 1.6;
  }

  .choice-btn:hover {
    border-color: var(--accent1);
    background: var(--accent3);
    transform: translateX(4px);
  }

  .choice-btn.selected {
    border-color: var(--gold);
    background: linear-gradient(135deg, var(--accent3), #f0e0cc);
    box-shadow: 0 2px 10px var(--shadow);
  }

  .submit-btn {
    display: block;
    width: 100%;
    background: linear-gradient(135deg, var(--accent1), var(--gold));
    border: none;
    border-radius: 14px;
    padding: 15px 24px;
    font-size: 15px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 500;
    color: white;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.3s ease;
    box-shadow: 0 4px 16px rgba(184,145,74,0.3);
  }

  .submit-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(184,145,74,0.4);
  }

  .submit-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .loading {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 16px 20px;
    background: var(--ai-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    border-top-left-radius: 4px;
    font-size: 13px;
    color: var(--text-light);
    font-family: 'Zen Maru Gothic', sans-serif;
  }

  .dots span {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent1);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
    margin: 0 2px;
  }

  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }

  .summary-card {
    background: linear-gradient(145deg, var(--ai-bg), #f0e8de);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    margin-top: 8px;
    box-shadow: 0 4px 24px var(--shadow);
  }

  .summary-card h3 {
    font-size: 13px;
    letter-spacing: 0.12em;
    color: var(--gold);
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .summary-card p {
    font-size: 14px;
    line-height: 1.9;
    color: var(--text);
    font-weight: 300;
    margin-bottom: 16px;
  }

  .summary-card p:last-child { margin-bottom: 0; }

  .restart-btn {
    display: block;
    margin: 32px auto 0;
    background: none;
    border: 1.5px solid var(--accent1);
    border-radius: 12px;
    padding: 12px 32px;
    font-size: 14px;
    font-family: 'Zen Maru Gothic', sans-serif;
    color: var(--gold);
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.3s;
  }

  .restart-btn:hover {
    background: var(--accent3);
    transform: translateY(-1px);
  }

  .share-area {
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
  }

  .copy-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, var(--accent1), var(--gold));
    border: none;
    border-radius: 14px;
    padding: 14px 28px;
    font-size: 15px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 500;
    color: white;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.3s ease;
    box-shadow: 0 4px 16px rgba(184,145,74,0.3);
    width: 100%;
    justify-content: center;
  }

  .copy-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(184,145,74,0.4);
  }

  .copy-btn.copied {
    background: linear-gradient(135deg, #7a9e7e, #5a8a5e);
    box-shadow: 0 4px 16px rgba(90,138,94,0.3);
  }

  .share-hint {
    font-size: 12px;
    color: var(--text-light);
    font-family: 'Zen Maru Gothic', sans-serif;
    letter-spacing: 0.05em;
    text-align: center;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }
</style>
</head>
<body>

<div class="header">
  <div class="symbol">🌸</div>
  <h1>私を好きになるジャーナリング</h1>
  <p>自分の気持ちと、やさしく向き合う時間</p>
</div>

<div class="stage-bar" id="stageBar">
  <div class="stage-dot active" id="dot0"></div>
  <div class="stage-dot" id="dot1"></div>
  <div class="stage-dot" id="dot2"></div>
  <div class="stage-dot" id="dot3"></div>
  <div class="stage-dot" id="dot4"></div>
</div>

<div class="chat-area" id="chatArea"></div>
<div class="input-section" id="inputSection" style="max-width:680px;width:100%;"></div>

<script>
const CLAUDE_MODEL = "claude-sonnet-4-20250514";

let stage = 0;
let sessionData = {
  entries: [],
  deepEntry: "",
  firstChoice: "",
  secondChoice: ""
};

function aiBubble(text, label) {
  const chat = document.getElementById("chatArea");
  const b = document.createElement("div");
  b.className = "bubble ai";
  b.innerHTML = `
    <div class="avatar ai-avatar">🌸</div>
    <div class="msg">
      ${label ? `<span class="label">${label}</span>` : ""}
      ${text.replace(/\n/g, "<br>")}
    </div>`;
  chat.appendChild(b);
  b.scrollIntoView({ behavior: "smooth", block: "end" });
}

function userBubble(text) {
  const chat = document.getElementById("chatArea");
  const b = document.createElement("div");
  b.className = "bubble user";
  b.innerHTML = `
    <div class="avatar user-avatar">🪷</div>
    <div class="msg">${text.replace(/\n/g, "<br>")}</div>`;
  chat.appendChild(b);
  b.scrollIntoView({ behavior: "smooth", block: "end" });
}

let _loadingTimer = null;
const _waitMessages = [
  "もう少しだけお待ちくださいね、丁寧に考えています...",
  "あなたの気持ちにしっかり向き合っています、もう少し...",
  "もうすぐです、そのままお待ちください🌸"
];
let _waitMsgIndex = 0;

function showLoading() {
  const chat = document.getElementById("chatArea");
  const ld = document.createElement("div");
  ld.className = "bubble ai";
  ld.id = "loadingBubble";
  ld.innerHTML = `
    <div class="avatar ai-avatar">🌸</div>
    <div class="loading">
      <div class="dots"><span></span><span></span><span></span></div>
      <span id="loadingText">考えています...</span>
    </div>`;
  chat.appendChild(ld);
  ld.scrollIntoView({ behavior: "smooth", block: "end" });

  _waitMsgIndex = 0;
  function showNextMessage() {
    const txt = document.getElementById("loadingText");
    if (!txt) return;
    const msg = _waitMessages[Math.min(_waitMsgIndex, _waitMessages.length - 1)];
    txt.style.transition = "opacity 0.5s";
    txt.style.opacity = "0";
    setTimeout(() => {
      txt.textContent = msg;
      txt.style.opacity = "1";
    }, 500);
    _waitMsgIndex++;
    _loadingTimer = setTimeout(showNextMessage, 20000);
  }
  _loadingTimer = setTimeout(showNextMessage, 20000);
}

function removeLoading() {
  if (_loadingTimer) { clearTimeout(_loadingTimer); _loadingTimer = null; }
  const ld = document.getElementById("loadingBubble");
  if (ld) ld.remove();
}

function setDot(n, state) {
  const dot = document.getElementById("dot" + n);
  dot.className = "stage-dot " + state;
}

function updateStageBar(current) {
  for (let i = 0; i < 5; i++) {
    if (i < current) setDot(i, "done");
    else if (i === current) setDot(i, "active");
    else setDot(i, "");
  }
}

async function callClaude(systemPrompt, userMessage) {
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: CLAUDE_MODEL,
      max_tokens: 1000,
      system: systemPrompt,
      messages: [{ role: "user", content: userMessage }]
    })
  });
  const data = await response.json();
  return data.content.map(c => c.text || "").join("\n").trim();
}

// ─── STAGE 0: 入力画面 ───────────────────────────────────────────────
function renderStage0() {
  aiBubble(
    "こんにちは。\nここはあなただけの、やさしい時間です。\n\n今日あったこと、今の気持ち、頭の中にあること——\nどんな小さなことでも大丈夫です。\n思いつくままに、5つ書いてみてください。",
    "STEP 1 / 出来事・気持ちを書く"
  );

  const sec = document.getElementById("inputSection");
  sec.innerHTML = `
    <div class="input-hint">今日の出来事や気持ちを5つ</div>
    <div class="entries-grid">
      ${[1,2,3,4,5].map(i => `
        <div class="entry-row">
          <span class="entry-num">${i}</span>
          <textarea class="entry-input" id="e${i}" rows="1"
            placeholder="${i===1?"例：仕事でミスをして落ち込んだ":i===2?"例：友達と話せて少し楽になった":i===3?"例：なんとなくモヤモヤしている":i===4?"例：夜眠れなかった":"例：自分が嫌になる瞬間があった"}"></textarea>
        </div>`).join("")}
    </div>
    <button class="submit-btn" id="s0btn" onclick="submitStage0()">次へ ›</button>
  `;

  // auto-resize
  document.querySelectorAll('.entry-input').forEach(ta => {
    ta.addEventListener('input', () => {
      ta.style.height = 'auto';
      ta.style.height = ta.scrollHeight + 'px';
    });
  });
}

async function submitStage0() {
  const entries = [1,2,3,4,5].map(i => document.getElementById("e"+i).value.trim()).filter(Boolean);
  if (entries.length < 3) {
    alert("3つ以上書いてみてください 🌸");
    return;
  }

  sessionData.entries = entries;
  const userText = entries.map((e,i) => `${i+1}. ${e}`).join("\n");
  userBubble(userText);
  document.getElementById("inputSection").innerHTML = "";
  showLoading();

  stage = 1;
  updateStageBar(1);

  const system = `あなたは温かく共感力の高い日本語のジャーナリングコーチです。
ユーザーが書いた今日の出来事・気持ちのリストを受け取ります。

以下の順で応答してください：
1. まずそのまま受け取り、すべての気持ちを温かく承認する（2〜3文）
2. 書かれた内容を優しく分析・整理する（2〜3文）
3. 特に深堀りしたい1つを選んで（最も感情が動いていそうなもの）、「〜について、もう少し教えてもらえますか？」という形で1つだけ質問する

語調は「ですます調」で温かく、でも軽すぎない。絵文字は使わない。改行を活かして読みやすく。`;

  const reply = await callClaude(system, `今日の出来事・気持ち：\n${userText}`);
  removeLoading();
  aiBubble(reply, "STEP 2 / 承認・深掘り");

  renderStage1(reply);
}

// ─── STAGE 1: 深掘り回答 ────────────────────────────────────────────
function renderStage1(aiReply) {
  const sec = document.getElementById("inputSection");
  sec.innerHTML = `
    <textarea class="main-textarea" id="deep" placeholder="感じていることを、自由に書いてください..."></textarea>
    <button class="submit-btn" onclick="submitStage1()">伝える ›</button>
  `;
  document.getElementById("deep").focus();
}

async function submitStage1() {
  const val = document.getElementById("deep").value.trim();
  if (!val) return;

  sessionData.deepEntry = val;
  userBubble(val);
  document.getElementById("inputSection").innerHTML = "";
  showLoading();

  stage = 2;
  updateStageBar(2);

  const system = `あなたは温かく共感力の高い日本語のジャーナリングコーチです。
ユーザーが深掘り質問に答えてくれました。

以下の順で応答してください：
1. 出てきた言葉・気持ちを丁寧に承認する（2〜3文）
2. その気持ちの背景や意味を優しく分析する（2〜3文）
3. 「では、こんなことを試してみるのはどうでしょう」と前置きして、具体的な解決策・対処法を3つ提案する
   （各項目を「・」で始め、短く具体的に）

語調は「ですます調」で温かく。絵文字は使わない。`;

  const context = `最初の出来事リスト：\n${sessionData.entries.join("\n")}\n\n深掘りへの回答：\n${val}`;
  const reply = await callClaude(system, context);
  removeLoading();
  aiBubble(reply, "STEP 3 / 解決への道を探る");

  renderStage2(reply);
}

// ─── STAGE 2: 解決策1回目を選ぶ ────────────────────────────────────
function renderStage2(aiReply) {
  const lines = aiReply.split("\n").filter(l => l.trim().startsWith("・"));
  const choices = lines.map(l => l.replace(/^・\s*/, "").trim());

  const sec = document.getElementById("inputSection");
  let selectedIdx = -1;

  sec.innerHTML = `
    <div class="input-hint">心に響いた選択肢を選ぶか、自分の言葉で書いてください</div>
    <div class="choices" id="choicesDiv">
      ${choices.map((c,i) => `<button class="choice-btn" onclick="selectChoice(${i}, '${c.replace(/'/g,"&#39;")}', this)">・${c}</button>`).join("")}
    </div>
    <textarea class="main-textarea" id="freeChoice" rows="2" placeholder="または、自分の言葉で書く..."></textarea>
    <button class="submit-btn" onclick="submitStage2()">これを選ぶ ›</button>
  `;
}

let _selectedChoiceText = "";
function selectChoice(idx, text, btn) {
  document.querySelectorAll(".choice-btn").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
  _selectedChoiceText = text;
  const fc = document.getElementById("freeChoice") || document.getElementById("freeChoice2");
  if (fc) fc.value = "";
}

async function submitStage2() {
  const free = document.getElementById("freeChoice").value.trim();
  const chosen = free || _selectedChoiceText;
  if (!chosen) { alert("選択肢を選ぶか、自由に書いてみてください 🌸"); return; }

  sessionData.firstChoice = chosen;
  userBubble(chosen);
  document.getElementById("inputSection").innerHTML = "";
  showLoading();

  stage = 3;
  updateStageBar(3);

  const system = `あなたは温かく共感力の高い日本語のジャーナリングコーチです。
ユーザーが解決策を1つ選びました。

以下の順で応答してください：
1. その選択を温かく承認し、意味づけをする（2〜3文）
2. その選択が示すユーザーの強みや成長を分析する（1〜2文）
3. さらに一歩深めるための新しい解決策・アクションを3つ提案する
   （各項目を「・」で始め、より具体的・実践的に）

語調は「ですます調」で温かく。絵文字は使わない。`;

  const context = `状況：${sessionData.deepEntry}\n選んだ解決策：${chosen}`;
  const reply = await callClaude(system, context);
  removeLoading();
  aiBubble(reply, "STEP 4 / さらに深める");

  renderStage3(reply);
}

// ─── STAGE 3: 解決策2回目を選ぶ ────────────────────────────────────
function renderStage3(aiReply) {
  const lines = aiReply.split("\n").filter(l => l.trim().startsWith("・"));
  const choices = lines.map(l => l.replace(/^・\s*/, "").trim());

  const sec = document.getElementById("inputSection");
  _selectedChoiceText = "";

  sec.innerHTML = `
    <div class="input-hint">さらに一歩、踏み出せそうな選択肢は？</div>
    <div class="choices" id="choicesDiv2">
      ${choices.map((c,i) => `<button class="choice-btn" onclick="selectChoice(${i}, '${c.replace(/'/g,"&#39;")}', this)">・${c}</button>`).join("")}
    </div>
    <textarea class="main-textarea" id="freeChoice2" rows="2" placeholder="または、自分の言葉で書く..."></textarea>
    <button class="submit-btn" onclick="submitStage3()">最後に進む ›</button>
  `;
}

async function submitStage3() {
  const free = document.getElementById("freeChoice2").value.trim();
  const chosen = free || _selectedChoiceText;
  if (!chosen) { alert("選択肢を選ぶか、自由に書いてみてください 🌸"); return; }

  sessionData.secondChoice = chosen;
  userBubble(chosen);
  document.getElementById("inputSection").innerHTML = "";
  showLoading();

  stage = 4;
  updateStageBar(4);

  const system = `あなたは温かく共感力の高い日本語のジャーナリングコーチです。
ユーザーが最終的な選択をしました。今日のジャーナリングのまとめを作ります。

以下の構成で、温かく詳しいまとめを書いてください：

【選んだ道について】
選んだ選択を長めに評価する（3〜4文）。なぜそれが素晴らしいか、どんな変化を生むか。

【本日のまとめ】
①事実（問題定義）：今日の中心的な出来事・問題を1〜2文で
②最初の気持ち：最初に書いてくれた言葉から感じ取れる感情を1〜2文で
③感情の変化：最終的な選択から読み取れる、気持ちの変化・成長を2〜3文で
④あなたへのメッセージ：温かく褒め、前向きに励ます（3〜4文。最後をポジティブに締める）

語調は「ですます調」で温かく、丁寧に。絵文字は使わない。`;

  const context = `最初の出来事：\n${sessionData.entries.join("\n")}\n\n深掘り：${sessionData.deepEntry}\n最初の選択：${sessionData.firstChoice}\n最終的な選択：${chosen}`;
  const reply = await callClaude(system, context);
  removeLoading();

  // 最終サマリーを特別なカードで表示
  renderSummary(reply);
}

// ─── STAGE 4: まとめ ────────────────────────────────────────────────
function renderSummary(text) {
  const chat = document.getElementById("chatArea");
  const b = document.createElement("div");
  b.className = "bubble ai";
  b.style.animation = "slideUp 0.6s ease";
  b.innerHTML = `
    <div class="avatar ai-avatar">🌸</div>
    <div style="max-width:calc(100% - 48px)">
      <div class="summary-card">
        <span class="label" style="font-size:12px;letter-spacing:0.12em;color:var(--gold);font-family:'Zen Maru Gothic',sans-serif;display:block;margin-bottom:12px;">STEP 5 / 本日のまとめ</span>
        <div id="summaryText" style="font-size:14px;line-height:1.9;color:var(--text);font-weight:300;white-space:pre-wrap">${text}</div>
      </div>
    </div>`;
  chat.appendChild(b);

  const today = new Date().toLocaleDateString('ja-JP', {year:'numeric',month:'long',day:'numeric'});
  const copyText = '🌸 私を好きになるジャーナリング\n' + today + '\n\n' + text;

  document.getElementById("inputSection").innerHTML = `
    <div class="share-area">
      <button class="copy-btn" id="copyBtn" onclick="copyToClipboard()">
        📋 まとめをコピーする
      </button>
      <p class="share-hint">コピーしてLINEやインスタに貼り付けられます🌸</p>
    </div>
    <button class="restart-btn" onclick="restart()">🌸 また話しかける</button>
  `;

  window._copyText = copyText;
  b.scrollIntoView({ behavior: "smooth", block: "start" });
}

function copyToClipboard() {
  navigator.clipboard.writeText(window._copyText || "").then(() => {
    const btn = document.getElementById("copyBtn");
    btn.classList.add("copied");
    btn.textContent = "✅ コピーしました！";
    setTimeout(() => {
      btn.classList.remove("copied");
      btn.innerHTML = "📋 まとめをコピーする";
    }, 3000);
  }).catch(() => {
    // フォールバック
    const ta = document.createElement("textarea");
    ta.value = window._copyText || "";
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    const btn = document.getElementById("copyBtn");
    btn.classList.add("copied");
    btn.textContent = "✅ コピーしました！";
    setTimeout(() => {
      btn.classList.remove("copied");
      btn.innerHTML = "📋 まとめをコピーする";
    }, 3000);
  });
}

function restart() {
  document.getElementById("chatArea").innerHTML = "";
  document.getElementById("inputSection").innerHTML = "";
  stage = 0;
  sessionData = { entries: [], deepEntry: "", firstChoice: "", secondChoice: "" };
  _selectedChoiceText = "";
  updateStageBar(0);
  renderStage0();
}

// ── 起動 ──
window.onload = () => {
  updateStageBar(0);
  renderStage0();
};
</script>
</body>
