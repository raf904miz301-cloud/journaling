<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>私を好きになるジャーナリング</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300;400&family=Shippori+Mincho:wght@400;500&family=Zen+Maru+Gothic:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0b08;
    --surface: #1a1410;
    --gold: #c8a96e;
    --gold-light: #e8c98e;
    --gold-dim: #8a6e40;
    --cream: #f5ede0;
    --cream-dim: #c8b89a;
    --text: #f0e6d6;
    --text-muted: #8a7a68;
    --border: rgba(200,169,110,0.2);
    --glow: rgba(200,169,110,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Noto Serif JP', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    cursor: default;
  }

  /* ── 背景装飾 ── */
  .bg-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
  }
  .bg-orb-1 {
    width: 600px; height: 600px;
    top: -200px; left: -200px;
    background: radial-gradient(circle, rgba(180,130,70,0.12) 0%, transparent 70%);
    animation: float1 12s ease-in-out infinite;
  }
  .bg-orb-2 {
    width: 500px; height: 500px;
    bottom: -100px; right: -100px;
    background: radial-gradient(circle, rgba(200,150,80,0.1) 0%, transparent 70%);
    animation: float2 15s ease-in-out infinite;
  }
  .bg-orb-3 {
    width: 300px; height: 300px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(220,180,120,0.06) 0%, transparent 70%);
    animation: pulse 8s ease-in-out infinite;
  }

  /* ── メインコンテナ ── */
  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
  }

  /* ── 上部装飾ライン ── */
  .deco-top {
    position: absolute;
    top: 40px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 16px;
    opacity: 0;
    animation: fadeIn 1.5s ease 0.3s forwards;
  }

  .deco-line {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim));
  }
  .deco-line.right {
    background: linear-gradient(90deg, var(--gold-dim), transparent);
  }

  .deco-center {
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--gold-dim);
    font-family: 'Zen Maru Gothic', sans-serif;
  }

  /* ── 花のシンボル ── */
  .hero-symbol {
    font-size: 48px;
    margin-bottom: 32px;
    opacity: 0;
    animation: bloomIn 1.2s cubic-bezier(0.22,1,0.36,1) 0.6s forwards;
    filter: drop-shadow(0 0 20px rgba(200,169,110,0.4));
  }

  /* ── メインタイトル ── */
  .hero-title {
    font-family: 'Shippori Mincho', serif;
    font-size: clamp(28px, 7vw, 52px);
    font-weight: 400;
    letter-spacing: 0.15em;
    text-align: center;
    line-height: 1.4;
    opacity: 0;
    animation: slideUp 1s ease 0.9s forwards;
  }

  .hero-title .line1 {
    display: block;
    background: linear-gradient(135deg, var(--cream) 0%, var(--gold-light) 50%, var(--cream) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-title .line2 {
    display: block;
    font-size: 0.55em;
    color: var(--gold);
    letter-spacing: 0.2em;
    margin-top: 12px;
    font-weight: 300;
    -webkit-text-fill-color: var(--gold);
  }

  /* ── サブコピー ── */
  .hero-sub {
    margin-top: 28px;
    font-size: clamp(13px, 3vw, 16px);
    color: var(--cream-dim);
    font-weight: 200;
    letter-spacing: 0.12em;
    line-height: 2;
    text-align: center;
    max-width: 420px;
    opacity: 0;
    animation: slideUp 1s ease 1.2s forwards;
  }

  /* ── 区切り ── */
  .divider {
    width: 1px;
    height: 48px;
    background: linear-gradient(to bottom, transparent, var(--gold-dim), transparent);
    margin: 40px auto;
    opacity: 0;
    animation: fadeIn 1s ease 1.5s forwards;
  }

  /* ── 特徴リスト ── */
  .features {
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-width: 360px;
    width: 100%;
    margin-bottom: 48px;
    opacity: 0;
    animation: slideUp 1s ease 1.6s forwards;
  }

  .feature-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 20px;
    background: rgba(200,169,110,0.05);
    border: 1px solid var(--border);
    border-radius: 12px;
    transition: all 0.4s ease;
  }

  .feature-item:hover {
    background: rgba(200,169,110,0.1);
    border-color: rgba(200,169,110,0.35);
    transform: translateX(4px);
  }

  .feature-icon {
    font-size: 18px;
    min-width: 24px;
    text-align: center;
  }

  .feature-text {
    font-size: 13px;
    color: var(--cream-dim);
    letter-spacing: 0.06em;
    line-height: 1.6;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 300;
  }

  /* ── CTAボタン ── */
  .cta-wrapper {
    opacity: 0;
    animation: bloomIn 1s ease 2s forwards;
    position: relative;
  }

  .cta-glow {
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200,169,110,0.2) 0%, transparent 70%);
    animation: pulse 3s ease-in-out infinite;
  }

  .cta-btn {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: linear-gradient(135deg, #2a1e10 0%, #1a1208 50%, #2a1e10 100%);
    border: 1.5px solid var(--gold);
    color: var(--gold-light);
    text-decoration: none;
    cursor: pointer;
    transition: all 0.5s cubic-bezier(0.22,1,0.36,1);
    box-shadow:
      0 0 40px rgba(200,169,110,0.15),
      inset 0 0 40px rgba(200,169,110,0.05);
    gap: 8px;
  }

  .cta-btn::before {
    content: '';
    position: absolute;
    inset: 6px;
    border-radius: 50%;
    border: 1px solid rgba(200,169,110,0.2);
    transition: all 0.5s ease;
  }

  .cta-btn:hover {
    transform: scale(1.06);
    border-color: var(--gold-light);
    box-shadow:
      0 0 60px rgba(200,169,110,0.3),
      0 0 120px rgba(200,169,110,0.1),
      inset 0 0 40px rgba(200,169,110,0.1);
    background: linear-gradient(135deg, #3a2a18 0%, #2a1e10 50%, #3a2a18 100%);
  }

  .cta-btn:hover::before {
    inset: 4px;
    border-color: rgba(200,169,110,0.4);
  }

  .cta-symbol { font-size: 28px; }

  .cta-main {
    font-family: 'Shippori Mincho', serif;
    font-size: 17px;
    letter-spacing: 0.15em;
    font-weight: 400;
    background: linear-gradient(135deg, var(--cream), var(--gold-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .cta-sub {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--gold-dim);
  }

  /* ── 下部メモ ── */
  .bottom-note {
    margin-top: 48px;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    font-family: 'Zen Maru Gothic', sans-serif;
    text-align: center;
    line-height: 2;
    opacity: 0;
    animation: fadeIn 1s ease 2.4s forwards;
  }

  /* ── フッター装飾 ── */
  .deco-bottom {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0;
    animation: fadeIn 1.5s ease 2.5s forwards;
  }

  .deco-bottom-inner {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  /* ── アニメーション ── */
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes bloomIn {
    from { opacity: 0; transform: scale(0.8); }
    to   { opacity: 1; transform: scale(1); }
  }

  @keyframes float1 {
    0%, 100% { transform: translate(0, 0); }
    50%       { transform: translate(30px, 40px); }
  }

  @keyframes float2 {
    0%, 100% { transform: translate(0, 0); }
    50%       { transform: translate(-30px, -40px); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.6; transform: scale(1) translate(-50%,-50%); }
    50%       { opacity: 1;   transform: scale(1.1) translate(-45%,-45%); }
  }

  /* モバイル */
  @media (max-width: 480px) {
    .cta-btn { width: 160px; height: 160px; }
    .cta-main { font-size: 15px; }
  }
</style>
</head>
<body>

<!-- 背景 -->
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="bg-orb bg-orb-3"></div>

<div class="page">

  <!-- 上部デコ -->
  <div class="deco-top">
    <div class="deco-line"></div>
    <span class="deco-center">JOURNALING</span>
    <div class="deco-line right"></div>
  </div>

  <!-- シンボル -->
  <div class="hero-symbol">🌸</div>

  <!-- タイトル -->
  <h1 class="hero-title">
    <span class="line1">私を好きになる</span>
    <span class="line2">ジャーナリング</span>
  </h1>

  <!-- サブコピー -->
  <p class="hero-sub">
    自分の気持ちと、やさしく向き合う時間。<br>
    AIと対話しながら、5つのステップで<br>
    今日の自分を受け取ってあげましょう。
  </p>

  <div class="divider"></div>

  <!-- 特徴 -->
  <div class="features">
    <div class="feature-item">
      <span class="feature-icon">✦</span>
      <span class="feature-text">今日の気持ちを5つ書き出す</span>
    </div>
    <div class="feature-item">
      <span class="feature-icon">✦</span>
      <span class="feature-text">AIが承認・深掘り・分析してくれる</span>
    </div>
    <div class="feature-item">
      <span class="feature-icon">✦</span>
      <span class="feature-text">解決策を一緒に選び、前向きになれる</span>
    </div>
    <div class="feature-item">
      <span class="feature-icon">✦</span>
      <span class="feature-text">最後に今日の自分をまとめて褒めてもらえる</span>
    </div>
  </div>

  <!-- CTAボタン -->
  <div class="cta-wrapper">
    <div class="cta-glow"></div>
    <a class="cta-btn" href="journaling-app.html">
      <span class="cta-symbol">🪷</span>
      <span class="cta-main">はじめる</span>
      <span class="cta-sub">TAP TO START</span>
    </a>
  </div>

  <!-- 下部メモ -->
  <p class="bottom-note">
    所要時間：約10〜15分<br>
    どんな小さな気持ちでも、大丈夫です
  </p>

  <!-- 下部デコ -->
  <div class="deco-bottom">
    <div class="deco-bottom-inner">
      <div class="deco-line"></div>
      <span class="deco-center" style="color:var(--text-muted)">🌸</span>
      <div class="deco-line right"></div>
    </div>
  </div>

</div>
</body>
</html>
