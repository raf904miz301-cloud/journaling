<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心に寄り添うジャーナリング</title>
    <style>
        /* ベースの色（淡いピンクとブラウン） */
        :root {
            --bg-color: #fdf6f0;      /* 背景：淡いピンクベージュ */
            --container-bg: #ffffff;   /* 中央：白 */
            --accent-color: #e8aeba;  /* アクセント：ピンク */
            --text-color: #5d504a;    /* 文字：温かいブラウン */
        }

        body {
            /* 明朝体（Serif）に設定 */
            font-family: "BIZ UDPMincho", "Hiragino Mincho ProN", "MS Mincho", serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center; /* 左右中央 */
            align-items: center;     /* 上下中央 */
            min-height: 100vh;        /* 画面いっぱいの高さ */
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: var(--container-bg);
            padding: 40px;
            border-radius: 50%; /* 正円に近い形 */
            aspect-ratio: 1 / 1; /* 縦横比を1:1に固定 */
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-sizing: border-box; /* パディングを含める */
        }

        h1 {
            font-size: 1.6rem;
            margin-bottom: 25px;
            color: var(--accent-color);
            font-weight: 600;
        }

        /* 入力欄（テキストエリア）の設定 */
        textarea {
            width: 100%;
            height: 180px; /* 初期高さ */
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 15px;
            background-color: #fafafa;
            font-family: inherit; /* 明朝体を継承 */
            font-size: 1rem;
            line-height: 1.6;
            resize: vertical; /* 縦方向のみリサイズ可能に */
            overflow-y: auto;   /* 縦スクロールバーを自動表示 */
            box-sizing: border-box;
            margin-bottom: 25px;
            outline: none;
            transition: 0.3s;
        }
        
        /* 端まで行ったら折り返し */
        textarea {
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        textarea:focus {
            border-color: var(--accent-color);
            background-color: white;
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-family: inherit; /* 明朝体を継承 */
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(232, 174, 186, 0.3);
            width: 100%;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        button:disabled {
            background-color: #ccc;
            box-shadow: none;
            cursor: not-allowed;
        }

        #loading {
            display: none;
            margin: 20px 0;
            font-size: 0.9rem;
            color: #999;
        }

        /* AIの返信表示エリア */
        #response {
            margin-top: 30px;
            padding: 20px;
            border-radius: 15px;
            background-color: #fff9f9;
            border: 1px dashed var(--accent-color);
            line-height: 1.8;
            text-align: left;
            display: none;
            /* 改行をそのまま表示し、端で折り返す */
            white-space: pre-wrap;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ジャーナリングの時間</h1>
        <textarea id="journalInput" placeholder="今、心にあることをそのまま言葉にしてみましょう..."></textarea>
        <button id="sendBtn">AIに話しかける</button>
        <div id="loading">ゆっくり、AIが言葉を紡いでいます...</div>
        <div id="response"></div>
    </div>

    <script>
        const input = document.getElementById('journalInput');
        const btn = document.getElementById('sendBtn');
        const responseDiv = document.getElementById('response');
        const loading = document.getElementById('loading');

        btn.addEventListener('click', async () => {
            const text = input.value.trim();
            if (!text) return;

            btn.disabled = true;
            loading.style.display = 'block';
            responseDiv.style.display = 'none';

            try {
                // あなたのフォルダ名「API」に完全に合わせました
                const response = await fetch('/API/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                const data = await response.json();
                if (response.ok) {
                    const reply = data.content && data.content[0] ? data.content[0].text : 'ごめんなさい、お返事が見つかりませんでした。';
                    responseDiv.innerText = reply;
                    responseDiv.style.display = 'block';
                } else {
                    throw new Error(data.error || '少し調子が悪いみたいです。');
                }
            } catch (err) {
                alert('エラーが発生しました: ' + err.message);
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        });
    </script>
</body>
</html>
